name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint & Collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar que la suite colecta sin errores
        run: pytest --collect-only -q

  # Job E2E opcional: requiere una app en vivo y los secretos del repo.
  # Habilítalo definiendo APP_URL / APP_USER / APP_PASS en
  # Settings → Secrets and variables → Actions, y cambiando 'if' a true.
  e2e:
    name: End-to-End (opcional)
    runs-on: ubuntu-latest
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run E2E tests
        env:
          APP_URL: ${{ secrets.APP_URL }}
          APP_USER: ${{ secrets.APP_USER }}
          APP_PASS: ${{ secrets.APP_PASS }}
          HEADLESS: "true"
        run: pytest -v

      - name: Publicar evidencia
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-evidence
          path: |
            reports/
            screenshots/
          if-no-files-found: ignore
