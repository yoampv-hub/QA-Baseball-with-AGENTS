[pytest]
addopts = -v --strict-markers --html=reports/report.html --self-contained-html
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: pruebas rápidas de humo (flujo crítico)
    regression: suite de regresión completa
    happy_path: escenario exitoso
    error_path: manejo de errores/validaciones
    edge_case: casos límite
